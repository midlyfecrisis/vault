<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0a0a0a">
<title>VAULT — Hiratani Media</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;-webkit-font-smoothing:antialiased}
:root{
  --bg:#0a0a0a;--bg2:#111;--bg3:#191919;--card:#141414;
  --border:#242424;--border2:#2e2e2e;
  --text:#f2f2f2;--muted:#666;--hint:#2a2a2a;
  --red:#cc2222;--red2:#e02828;--red-dim:rgba(204,34,34,0.13);
  --green:#2e8b4e;--green-dim:rgba(46,139,78,0.13);
  --blue:#2563a8;--blue-dim:rgba(37,99,168,0.13);
  --radius:14px;--radius-sm:10px;--radius-xs:8px;
}
html,body{height:100%;overflow:hidden;background:var(--bg);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;color:var(--text)}
body{display:flex;flex-direction:column;max-width:430px;margin:0 auto}
.topbar{flex-shrink:0;display:flex;align-items:center;justify-content:space-between;padding:18px 16px 12px;border-bottom:1px solid var(--border)}
.logo-main{font-family:'Arial Black',Arial,sans-serif;font-size:24px;letter-spacing:4px;color:#fff;line-height:1}
.logo-sub{font-size:8px;letter-spacing:3px;color:var(--red);margin-top:2px}
.topbar-actions{display:flex;gap:8px}
.t-btn{width:38px;height:38px;border-radius:50%;border:1px solid var(--border2);background:var(--bg2);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px;color:var(--muted);transition:all 0.15s}
.t-btn:active{transform:scale(0.93)}
.t-btn.active{border-color:var(--red);color:var(--red)}
.tabs{flex-shrink:0;display:flex;background:var(--bg2);border-bottom:1px solid var(--border)}
.tab{flex:1;padding:11px 4px;text-align:center;font-size:8px;letter-spacing:2px;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;transition:all 0.15s;font-family:'Arial Black',Arial,sans-serif}
.tab.active{color:var(--red);border-bottom-color:var(--red)}
.main{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
.page{display:none;padding:14px 14px 100px}
.page.active{display:block}
.sec-label{font-family:'Arial Black',Arial,sans-serif;font-size:9px;letter-spacing:2px;color:var(--muted);margin:16px 0 10px;display:flex;align-items:center;gap:8px}
.sec-label::after{content:'';flex:1;height:1px;background:var(--border)}
.search-wrap{position:relative;margin-bottom:10px}
.search-input{width:100%;background:var(--bg2);border:1px solid var(--border2);border-radius:50px;padding:11px 14px 11px 40px;font-size:13px;color:var(--text);outline:none;transition:border-color 0.15s}
.search-input:focus{border-color:var(--red)}
.search-input::placeholder{color:var(--muted)}
.search-icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:14px;pointer-events:none}
.chips{display:flex;gap:6px;overflow-x:auto;padding-bottom:10px;margin-bottom:10px;scrollbar-width:none;-webkit-overflow-scrolling:touch}
.chips::-webkit-scrollbar{display:none}
.chip{flex-shrink:0;padding:7px 16px;border-radius:50px;font-size:9px;letter-spacing:1.5px;border:1px solid var(--border2);cursor:pointer;color:var(--muted);background:var(--bg2);transition:all 0.15s;font-family:'Arial Black',Arial,sans-serif}
.chip.active{background:var(--red);color:#fff;border-color:var(--red)}
.chip:active{transform:scale(0.94)}
.log-item{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;margin-bottom:8px;cursor:pointer;transition:all 0.15s}
.log-item:active{border-color:var(--red)}
.log-item.selected{border-color:var(--red);background:rgba(204,34,34,0.05)}
.log-top{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.log-icon{width:42px;height:42px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.log-main{flex:1;min-width:0}
.log-name{font-family:'Arial Black',Arial,sans-serif;font-size:13px;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.log-date{font-size:10px;color:var(--muted);margin-top:2px}
.log-check{color:var(--red);font-size:16px;flex-shrink:0}
.log-tags{display:flex;gap:5px;flex-wrap:wrap}
.tag{font-size:8px;padding:3px 10px;border-radius:50px;font-family:'Arial Black',Arial,sans-serif;letter-spacing:0.5px}
.tag-shot{background:var(--red-dim);color:var(--red);border:1px solid rgba(204,34,34,0.25)}
.tag-a{background:var(--green-dim);color:var(--green);border:1px solid rgba(46,139,78,0.25)}
.tag-b{background:var(--blue-dim);color:var(--blue);border:1px solid rgba(37,99,168,0.25)}
.tag-cat{background:var(--bg3);color:var(--muted);border:1px solid var(--border2)}
.log-notes{font-size:11px;color:var(--muted);margin-top:8px;line-height:1.6;padding-top:8px;border-top:1px solid var(--border)}
.empty-state{padding:60px 20px;text-align:center;color:var(--muted)}
.empty-icon{font-size:44px;display:block;margin-bottom:14px;opacity:0.3}
.empty-text{font-family:'Arial Black',Arial,sans-serif;font-size:10px;letter-spacing:1.5px;line-height:1.8}
.album-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;display:flex;align-items:center;gap:12px;margin-bottom:8px;cursor:pointer;transition:all 0.15s}
.album-card:active{border-color:var(--red)}
.album-icon-wrap{width:48px;height:48px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0}
.album-info{flex:1}
.album-name{font-family:'Arial Black',Arial,sans-serif;font-size:15px}
.album-sub{font-size:10px;color:var(--muted);margin-top:3px}
.album-badges{display:flex;gap:5px;margin-top:7px}
.abadge{font-size:8px;padding:2px 9px;border-radius:50px;font-family:'Arial Black',Arial,sans-serif}
.abadge-t{background:var(--bg3);color:var(--muted);border:1px solid var(--border2)}
.abadge-a{background:var(--green-dim);color:var(--green);border:1px solid rgba(46,139,78,0.3)}
.abadge-b{background:var(--blue-dim);color:var(--blue);border:1px solid rgba(37,99,168,0.3)}
.album-arr{color:var(--hint);font-size:20px}
.shot-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:10px;overflow:hidden;transition:border-color 0.15s}
.shot-card.sel-shot{border-color:var(--red)}
.shot-card-header{padding:14px;display:flex;gap:14px;align-items:flex-start;cursor:pointer}
.shot-card-header:active{background:rgba(255,255,255,0.02)}
.shot-silhouette{flex-shrink:0}
.shot-right{flex:1;display:flex;flex-direction:column}
.shot-info{flex:1}
.shot-name{font-family:'Arial Black',Arial,sans-serif;font-size:15px;color:var(--text)}
.shot-sub{font-size:9px;color:var(--red);letter-spacing:1px;margin-top:1px;font-family:'Arial Black',Arial,sans-serif}
.shot-desc{font-size:10px;color:var(--muted);margin-top:6px;line-height:1.6}
.shot-count{font-size:9px;color:var(--hint);margin-top:6px;font-family:'Arial Black',Arial,sans-serif}
.shot-count span{color:var(--red)}
.shot-chevron{font-size:18px;color:var(--muted);margin-left:auto;transition:transform 0.25s;flex-shrink:0;align-self:center}
.shot-card.expanded .shot-chevron{transform:rotate(90deg)}
.shot-expand{display:none;border-top:1px solid var(--border);padding:14px;background:var(--bg2)}
.shot-card.expanded .shot-expand{display:block}
.shot-ref-box{display:flex;align-items:center;gap:14px;background:var(--bg3);border:1px solid var(--border2);border-radius:var(--radius-sm);padding:12px;margin-bottom:14px}
.shot-ref-label{flex:1}
.shot-ref-name{font-family:'Arial Black',Arial,sans-serif;font-size:13px;color:var(--red)}
.shot-ref-desc{font-size:10px;color:var(--muted);margin-top:4px;line-height:1.5}
.extra-shots-wrap{margin-bottom:14px}
.extra-shots-title{font-size:9px;letter-spacing:2px;color:var(--muted);font-family:'Arial Black',Arial,sans-serif;margin-bottom:8px}
.extra-shot-chips{display:flex;gap:6px;flex-wrap:wrap}
.extra-chip{padding:6px 14px;border-radius:50px;border:1px solid var(--border2);font-size:9px;letter-spacing:1px;cursor:pointer;color:var(--muted);background:var(--bg3);transition:all 0.15s;font-family:'Arial Black',Arial,sans-serif}
.extra-chip:active{transform:scale(0.94)}
.extra-chip.sel{border-color:var(--red);color:var(--red);background:var(--red-dim)}
.shot-form-field{margin-bottom:12px}
.shot-form-label{font-size:9px;letter-spacing:2px;color:var(--muted);font-family:'Arial Black',Arial,sans-serif;margin-bottom:8px;display:block}
.shot-form-row{display:flex;gap:6px;flex-wrap:wrap}
.shot-save-btn{width:100%;height:46px;border-radius:50px;border:none;background:var(--red);color:#fff;font-family:'Arial Black',Arial,sans-serif;font-size:11px;letter-spacing:2px;cursor:pointer;margin-top:4px}
.shot-save-btn:active{transform:scale(0.98);background:var(--red2)}
.add-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:12px}
.add-card-title{font-family:'Arial Black',Arial,sans-serif;font-size:10px;letter-spacing:2px;color:var(--red);margin-bottom:14px;display:flex;align-items:center;gap:8px}
.add-card-title::after{content:'';flex:1;height:1px;background:var(--border)}
.field-wrap{margin-bottom:14px}
.field-wrap:last-child{margin-bottom:0}
.opt-row-wrap{position:relative}
.opt-row-wrap::after{content:'';position:absolute;top:0;right:0;height:calc(100% - 8px);width:30px;background:linear-gradient(to right,transparent,var(--card));pointer-events:none}
.opt-row{display:flex;gap:7px;overflow-x:auto;padding-bottom:8px;scrollbar-width:none;-webkit-overflow-scrolling:touch}
.opt-row::-webkit-scrollbar{display:none}
.opt-btn{flex-shrink:0;padding:8px 16px;border-radius:50px;border:1px solid var(--border2);font-size:9px;letter-spacing:1px;cursor:pointer;color:var(--muted);background:var(--bg3);transition:all 0.15s;font-family:'Arial Black',Arial,sans-serif}
.opt-btn:active{transform:scale(0.94)}
.opt-btn.sel-red{border-color:var(--red);color:var(--red);background:var(--red-dim)}
.opt-btn.sel-green{border-color:var(--green);color:var(--green);background:var(--green-dim)}
.opt-btn.sel-blue{border-color:var(--blue);color:var(--blue);background:var(--blue-dim)}
.text-input{width:100%;background:var(--bg3);border:1px solid var(--border2);border-radius:var(--radius-sm);padding:10px 14px;font-size:13px;color:var(--text);outline:none;transition:border-color 0.15s;font-family:inherit}
.text-input:focus{border-color:var(--red)}
.text-input::placeholder{color:var(--muted)}
.notes-input{width:100%;background:var(--bg3);border:1px solid var(--border2);border-radius:var(--radius-sm);padding:10px 14px;font-size:13px;color:var(--text);outline:none;resize:none;min-height:70px;transition:border-color 0.15s;font-family:inherit}
.notes-input:focus{border-color:var(--red)}
.notes-input::placeholder{color:var(--muted)}
.confirm-btn{width:100%;height:50px;border-radius:50px;border:none;background:var(--red);color:#fff;font-family:'Arial Black',Arial,sans-serif;font-size:12px;letter-spacing:2px;cursor:pointer;transition:all 0.15s;margin-bottom:10px}
.confirm-btn:active{transform:scale(0.98);background:var(--red2)}
.clear-btn{width:100%;height:44px;border-radius:50px;border:1px solid var(--border2);background:var(--bg3);color:var(--muted);font-family:'Arial Black',Arial,sans-serif;font-size:10px;letter-spacing:2px;cursor:pointer}
.bottom-bar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:linear-gradient(to top,var(--bg) 75%,transparent);padding:14px 14px 24px;z-index:100;display:none}
.bottom-inner{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--radius);padding:10px 14px;display:flex;align-items:center;gap:10px;box-shadow:0 -8px 40px rgba(0,0,0,0.7)}
.sel-label{font-size:10px;color:var(--muted);letter-spacing:1px;font-family:'Arial Black',Arial,sans-serif}
.sel-num{color:var(--red)}
.del-btn{height:40px;padding:0 20px;border-radius:50px;border:none;cursor:pointer;font-family:'Arial Black',Arial,sans-serif;font-size:10px;letter-spacing:1px;background:var(--red);color:#fff;margin-left:auto;transition:all 0.15s}
.del-btn:active{transform:scale(0.95)}
.sheet-backdrop{position:fixed;inset:0;background:rgba(0,0,0,0.8);z-index:200;display:none;align-items:flex-end}
.sheet-backdrop.open{display:flex}
.sheet{background:var(--bg2);border-top:1px solid var(--border2);border-radius:24px 24px 0 0;padding:20px 16px 44px;width:100%;max-height:90vh;overflow-y:auto}
.sheet-handle{width:36px;height:4px;border-radius:2px;background:var(--border2);margin:0 auto 18px}
.sheet-title{font-family:'Arial Black',Arial,sans-serif;font-size:13px;letter-spacing:1px;color:var(--text);margin-bottom:18px;display:flex;justify-content:space-between;align-items:center}
.sheet-close{color:var(--muted);font-size:24px;cursor:pointer;line-height:1}
.meta-row{display:flex;align-items:flex-start;gap:10px;margin-bottom:12px}
.meta-key{font-size:9px;letter-spacing:1.5px;color:var(--muted);font-family:'Arial Black',Arial,sans-serif;width:70px;flex-shrink:0;padding-top:3px}
.meta-val{font-size:12px;color:var(--text);flex:1}
.meta-badge{display:inline-flex;padding:4px 12px;border-radius:50px;font-size:8px;font-family:'Arial Black',Arial,sans-serif;letter-spacing:1px}
.sheet-btn{width:100%;height:46px;border-radius:50px;border:none;font-family:'Arial Black',Arial,sans-serif;font-size:11px;letter-spacing:1.5px;cursor:pointer;transition:all 0.15s;margin-top:8px}
.sheet-btn:active{transform:scale(0.98)}
.sheet-btn-del{background:rgba(204,34,34,0.15);color:var(--red);border:1px solid rgba(204,34,34,0.3)}
.sheet-btn-close{background:var(--bg3);color:var(--muted);border:1px solid var(--border2)}
</style>
</head>
<body>

<div class="topbar">
  <div>
    <div class="logo-main">VAULT</div>
    <div class="logo-sub">HIRATANI MEDIA</div>
  </div>
  <div class="topbar-actions">
    <div class="t-btn" id="selToggleBtn" onclick="toggleSelectMode()">☐</div>
    <div class="t-btn" onclick="openAddPage()">＋</div>
  </div>
</div>

<div class="tabs">
  <div class="tab active" onclick="switchTab('library',this)">LIBRARY</div>
  <div class="tab" onclick="switchTab('albums',this)">ALBUMS</div>
  <div class="tab" onclick="switchTab('shots',this)">SHOTS</div>
  <div class="tab" onclick="openAddPage()" id="addTab">ADD</div>
</div>

<div class="main">

  <div class="page active" id="page-library">
    <div class="search-wrap">
      <span class="search-icon">⌕</span>
      <input class="search-input" type="text" placeholder="search name, notes, category..." oninput="renderLibrary()">
    </div>
    <div class="chips" id="filterChips">
      <div class="chip active" onclick="setFilter('all',this)">ALL</div>
      <div class="chip" onclick="setFilter('photo',this)">PHOTOS</div>
      <div class="chip" onclick="setFilter('video',this)">VIDEOS</div>
      <div class="chip" onclick="setFilter('a-roll',this)">A-ROLL</div>
      <div class="chip" onclick="setFilter('b-roll',this)">B-ROLL</div>
      <div class="chip" onclick="setFilter('untagged',this)">UNTAGGED</div>
    </div>
    <div id="logList"></div>
  </div>

  <div class="page" id="page-albums">
    <div id="albumList"></div>
  </div>

  <div class="page" id="page-shots">
    <div class="sec-label">SHOT TYPE GUIDE</div>
    <div id="shotGuide"></div>
    <div class="sec-label" id="shotResultsLabel">ALL SHOT-TAGGED ENTRIES</div>
    <div id="shotLogList"></div>
  </div>

  <div class="page" id="page-add">
    <div class="add-card">
      <div class="add-card-title">FILE NAME</div>
      <div class="field-wrap">
        <input class="text-input" type="text" id="nameInput" placeholder="e.g. detailing_ceramic_broll_001">
      </div>
    </div>
    <div class="add-card">
      <div class="add-card-title">TYPE</div>
      <div class="field-wrap">
        <div class="opt-row">
          <div class="opt-btn" onclick="pickOpt(this,'type','photo','sel-red')">📷 PHOTO</div>
          <div class="opt-btn" onclick="pickOpt(this,'type','video','sel-red')">🎬 VIDEO</div>
        </div>
      </div>
    </div>
    <div class="add-card">
      <div class="add-card-title">CATEGORY</div>
      <div class="field-wrap">
        <div class="opt-row-wrap"><div class="opt-row" id="catOpts"></div></div>
      </div>
    </div>
    <div class="add-card">
      <div class="add-card-title">ROLL TYPE</div>
      <div class="field-wrap">
        <div class="opt-row">
          <div class="opt-btn" onclick="pickOpt(this,'roll','a-roll','sel-green')">A-ROLL</div>
          <div class="opt-btn" onclick="pickOpt(this,'roll','b-roll','sel-blue')">B-ROLL</div>
          <div class="opt-btn" onclick="pickOpt(this,'roll','untagged','sel-red')">UNTAGGED</div>
        </div>
      </div>
    </div>
    <div class="add-card">
      <div class="add-card-title">SHOT TYPE</div>
      <div class="field-wrap">
        <div class="opt-row-wrap"><div class="opt-row" id="shotOpts"></div></div>
      </div>
    </div>
    <div class="add-card">
      <div class="add-card-title">NOTES</div>
      <div class="field-wrap">
        <textarea class="notes-input" id="notesInput" placeholder="Location, description, context..." rows="3"></textarea>
      </div>
    </div>
    <button class="confirm-btn" onclick="saveEntry()">SAVE TO VAULT</button>
    <button class="clear-btn" onclick="resetAdd()">CLEAR</button>
  </div>

</div>

<div class="bottom-bar" id="bottomBar">
  <div class="bottom-inner">
    <div class="sel-label"><span class="sel-num" id="selNum">0</span> SELECTED</div>
    <button class="del-btn" onclick="deleteSelected()">DELETE</button>
  </div>
</div>

<div class="sheet-backdrop" id="sheetBackdrop" onclick="closeSheetOutside(event)">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-title">
      <span id="sheetTitleText">ENTRY</span>
      <span class="sheet-close" onclick="closeSheet()">×</span>
    </div>
    <div id="sheetContent"></div>
  </div>
</div>

<script>
const ALBUMS=[
  {id:'detailing', name:'DETAILING',     icon:'🧽',bg:'rgba(204,34,34,0.15)'},
  {id:'delivery',  name:'DELIVERY',      icon:'📦',bg:'rgba(46,139,78,0.15)'},
  {id:'travel',    name:'TRAVEL',        icon:'✈️',bg:'rgba(37,99,168,0.15)'},
  {id:'family',    name:'FAMILY',        icon:'🏠',bg:'rgba(160,60,200,0.15)'},
  {id:'shopping',  name:'SHOPPING',      icon:'🛒',bg:'rgba(160,120,40,0.15)'},
  {id:'food',      name:'FOOD & COOKING',icon:'🍳',bg:'rgba(200,100,40,0.15)'},
  {id:'restaurant',name:'RESTAURANT',    icon:'🍽️',bg:'rgba(60,160,80,0.15)'},
  {id:'hobbies',   name:'HOBBIES',       icon:'🎮',bg:'rgba(40,120,200,0.15)'},
  {id:'workouts',  name:'WORKOUTS',      icon:'💪',bg:'rgba(46,139,78,0.15)'},
  {id:'selfdefense',name:'SELF-DEFENSE', icon:'🥋',bg:'rgba(204,34,34,0.15)'}
];
const SHOTS=[
  {id:'ecu',    name:'DETAIL SHOT',  sub:'ECU — EXTREME CLOSE-UP',desc:'Eye, hand, texture, product detail. No body. Craftsmanship and reaction shots.',frameBottom:22},
  {id:'closeup',name:'CLOSE-UP',     sub:'CU — CLOSE-UP',         desc:'Head and shoulders fill the frame. Maximum emotional impact.',frameBottom:36},
  {id:'mcu',    name:'MED CLOSE-UP', sub:'MCU — MEDIUM CLOSE-UP', desc:'Chest and up. Standard interview, talking-head, and vlog framing.',frameBottom:52},
  {id:'medium', name:'MEDIUM SHOT',  sub:'MS — MEDIUM SHOT',      desc:'Waist and up. Natural conversational distance. Most common content shot.',frameBottom:68},
  {id:'full',   name:'FULL SHOT',    sub:'FS — FULL SHOT',        desc:'Head to toe fully in frame. Shows full body, outfit, and posture.',frameBottom:116},
  {id:'wide',   name:'WIDE SHOT',    sub:'WS — WIDE SHOT',        desc:'Subject small within a large environment. Establishes location and scale.',frameBottom:130}
];

let entries=[],selectedIds=new Set(),currentFilter='all',selectMode=false,currentShotFilter=null;
let addState={type:'',category:'',roll:'',shot:'',shots:[]};
let albumFilter=null;

function load(){try{const r=localStorage.getItem('vault_v3');if(r)entries=JSON.parse(r);}catch(e){entries=[];}}
function save(){try{localStorage.setItem('vault_v3',JSON.stringify(entries));}catch(e){alert('Storage error.');}}
load();

function switchTab(id,el){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById('page-'+id).classList.add('active');
  albumFilter=null;
  if(id==='library')renderLibrary();
  if(id==='albums')renderAlbums();
  if(id==='shots')renderShots();
}
function openAddPage(){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('addTab').classList.add('active');
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById('page-add').classList.add('active');
}

function setFilter(f,el){
  currentFilter=f;albumFilter=null;
  document.querySelectorAll('#filterChips .chip').forEach(c=>c.classList.remove('active'));
  el.classList.add('active');
  renderLibrary();
}

function renderLibrary(){
  const q=document.querySelector('.search-input').value.toLowerCase();
  let items=[...entries];
  if(albumFilter)items=items.filter(e=>e.category===albumFilter);
  else if(currentFilter==='photo')items=items.filter(e=>e.type==='photo');
  else if(currentFilter==='video')items=items.filter(e=>e.type==='video');
  else if(currentFilter==='a-roll')items=items.filter(e=>e.roll==='a-roll');
  else if(currentFilter==='b-roll')items=items.filter(e=>e.roll==='b-roll');
  else if(currentFilter==='untagged')items=items.filter(e=>!e.roll||e.roll==='untagged');
  if(q)items=items.filter(e=>
    (e.name||'').toLowerCase().includes(q)||
    (e.notes||'').toLowerCase().includes(q)||
    (e.category||'').toLowerCase().includes(q)||
    (e.shot||'').toLowerCase().includes(q)
  );
  const list=document.getElementById('logList');
  if(!items.length){
    list.innerHTML='<div class="empty-state"><span class="empty-icon">📭</span><div class="empty-text">NO ENTRIES YET<br>TAP + TO LOG MEDIA</div></div>';
    return;
  }
  list.innerHTML=items.map(e=>logItemHTML(e)).join('');
}

function logItemHTML(e){
  const alb=ALBUMS.find(a=>a.id===e.category);
  const shots=(e.shots&&e.shots.length?e.shots:(e.shot?[e.shot]:[])).map(id=>SHOTS.find(s=>s.id===id)).filter(Boolean);
  const dateStr=new Date(e.date).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
  return`<div class="log-item${selectedIds.has(e.id)?' selected':''}" onclick="itemClick('${e.id}')">
    <div class="log-top">
      <div class="log-icon" style="background:${alb?alb.bg:'var(--bg3)'}">${alb?alb.icon:(e.type==='video'?'🎬':'📷')}</div>
      <div class="log-main">
        <div class="log-name">${e.name||'Untitled'}</div>
        <div class="log-date">${dateStr} · ${(e.type||'media').toUpperCase()}</div>
      </div>
      ${selectMode?`<div class="log-check">${selectedIds.has(e.id)?'✓':''}</div>`:''}
    </div>
    <div class="log-tags">
      ${alb?`<span class="tag tag-cat">${alb.icon} ${alb.name}</span>`:''}
      ${e.roll&&e.roll!=='untagged'?`<span class="tag ${e.roll==='a-roll'?'tag-a':'tag-b'}">${e.roll.toUpperCase()}</span>`:''}
      ${shots.map(s=>`<span class="tag tag-shot">${s.name}</span>`).join('')}
    </div>
    ${e.notes?`<div class="log-notes">${e.notes}</div>`:''}
  </div>`;
}

function itemClick(id){
  if(selectMode){
    if(selectedIds.has(id))selectedIds.delete(id);else selectedIds.add(id);
    document.getElementById('selNum').textContent=selectedIds.size;
    renderLibrary();
  }else{openDetail(id);}
}

function toggleSelectMode(){
  selectMode=!selectMode;
  const btn=document.getElementById('selToggleBtn');
  const bar=document.getElementById('bottomBar');
  if(selectMode){btn.classList.add('active');btn.textContent='☑';bar.style.display='block';}
  else{btn.classList.remove('active');btn.textContent='☐';bar.style.display='none';selectedIds.clear();renderLibrary();}
}

function deleteSelected(){
  if(!selectedIds.size)return;
  if(!confirm('Delete '+selectedIds.size+' entr'+(selectedIds.size===1?'y':'ies')+'?'))return;
  entries=entries.filter(e=>!selectedIds.has(e.id));
  save();selectedIds.clear();
  document.getElementById('selNum').textContent=0;
  renderLibrary();
}

function renderAlbums(){
  document.getElementById('albumList').innerHTML=
    '<div class="sec-label">YOUR ALBUMS</div>'+
    ALBUMS.map(a=>{
      const items=entries.filter(e=>e.category===a.id);
      const ac=items.filter(e=>e.roll==='a-roll').length;
      const bc=items.filter(e=>e.roll==='b-roll').length;
      return`<div class="album-card" onclick="goAlbum('${a.id}')">
        <div class="album-icon-wrap" style="background:${a.bg}">${a.icon}</div>
        <div class="album-info">
          <div class="album-name">${a.name}</div>
          <div class="album-sub">${items.length} entr${items.length===1?'y':'ies'}</div>
          <div class="album-badges">
            <span class="abadge abadge-t">${items.length} TOTAL</span>
            <span class="abadge abadge-a">A ${ac}</span>
            <span class="abadge abadge-b">B ${bc}</span>
          </div>
        </div>
        <div class="album-arr">›</div>
      </div>`;
    }).join('');
}

function goAlbum(id){
  albumFilter=id;currentFilter='all';
  document.querySelector('.search-input').value='';
  switchTab('library',document.querySelectorAll('.tab')[0]);
  renderLibrary();
}

function silhouetteSVG(frameBottom){
  const uid=frameBottom,VH=130;
  const hCy=15,hR=11,bx=28,bw=24,shY=27,hipY=72;
  const lLegX=29,rLegX=41,legW=10,footY=112;
  const lArmX=19,rArmX=53,armW=8,armH=24;
  return`<svg viewBox="0 0 80 ${VH}" width="60" height="98" xmlns="http://www.w3.org/2000/svg">
    <defs><clipPath id="cf${uid}"><rect x="0" y="0" width="80" height="${frameBottom}"/></clipPath></defs>
    <g opacity="0.15" fill="#aaa">
      <circle cx="40" cy="${hCy}" r="${hR}"/>
      <rect x="${bx}" y="${shY}" width="${bw}" height="${hipY-shY}" rx="3"/>
      <rect x="${lArmX}" y="${shY}" width="${armW}" height="${armH}" rx="3"/>
      <rect x="${rArmX}" y="${shY}" width="${armW}" height="${armH}" rx="3"/>
      <rect x="${lLegX}" y="${hipY}" width="${legW}" height="${footY-hipY}" rx="3"/>
      <rect x="${rLegX}" y="${hipY}" width="${legW}" height="${footY-hipY}" rx="3"/>
    </g>
    <g clip-path="url(#cf${uid})" fill="#f0f0f0">
      <circle cx="40" cy="${hCy}" r="${hR}"/>
      <rect x="${bx}" y="${shY}" width="${bw}" height="${hipY-shY}" rx="3"/>
      <rect x="${lArmX}" y="${shY}" width="${armW}" height="${armH}" rx="3"/>
      <rect x="${rArmX}" y="${shY}" width="${armW}" height="${armH}" rx="3"/>
      <rect x="${lLegX}" y="${hipY}" width="${legW}" height="${footY-hipY}" rx="3"/>
      <rect x="${rLegX}" y="${hipY}" width="${legW}" height="${footY-hipY}" rx="3"/>
    </g>
    <rect x="2" y="2" width="76" height="${Math.min(frameBottom,VH)-4}" rx="5" fill="none" stroke="#cc2222" stroke-width="1.5" opacity="0.7"/>
    ${frameBottom<VH-2?`<line x1="2" y1="${frameBottom-2}" x2="78" y2="${frameBottom-2}" stroke="#cc2222" stroke-width="1.5" stroke-dasharray="5,3" opacity="0.9"/>`:''}
  </svg>`;
}

function renderShots(){
  document.getElementById('shotGuide').innerHTML=SHOTS.map(s=>{
    const otherShots=SHOTS.filter(x=>x.id!==s.id);
    const count=entries.filter(e=>(e.shots&&e.shots.includes(s.id))||e.shot===s.id).length;
    return`<div class="shot-card${currentShotFilter===s.id?' sel-shot':''}" id="sc_${s.id}">
      <div class="shot-card-header" onclick="toggleShotCard('${s.id}')">
        <div class="shot-silhouette">${silhouetteSVG(s.frameBottom)}</div>
        <div class="shot-right">
          <div class="shot-info">
            <div class="shot-name">${s.name}</div>
            <div class="shot-sub">${s.sub}</div>
            <div class="shot-desc">${s.desc}</div>
            <div class="shot-count"><span>${count}</span> logged</div>
          </div>
        </div>
        <div class="shot-chevron">›</div>
      </div>
      <div class="shot-expand" id="se_${s.id}">
        <div class="shot-ref-box">
          <div>${silhouetteSVG(s.frameBottom)}</div>
          <div class="shot-ref-label">
            <div class="shot-ref-name">${s.name}</div>
            <div class="shot-ref-desc">${s.desc}</div>
          </div>
        </div>
        <div class="extra-shots-wrap">
          <div class="extra-shots-title">ADD OTHER SHOT TYPES TOO?</div>
          <div class="extra-shot-chips">
            ${otherShots.map(x=>`<div class="extra-chip" id="ec_${s.id}_${x.id}" onclick="toggleExtraShot('${s.id}','${x.id}',this)">${x.name}</div>`).join('')}
          </div>
        </div>
        <div class="shot-form-field">
          <span class="shot-form-label">FILE NAME</span>
          <input class="text-input" type="text" id="sf_name_${s.id}" placeholder="e.g. detailing_ecu_001">
        </div>
        <div class="shot-form-field">
          <span class="shot-form-label">TYPE</span>
          <div class="shot-form-row">
            <div class="extra-chip" onclick="setShotFormOpt('${s.id}','type','photo',this)">📷 PHOTO</div>
            <div class="extra-chip" onclick="setShotFormOpt('${s.id}','type','video',this)">🎬 VIDEO</div>
          </div>
        </div>
        <div class="shot-form-field">
          <span class="shot-form-label">CATEGORY</span>
          <div class="shot-form-row" style="overflow-x:auto;flex-wrap:nowrap;padding-bottom:4px">
            ${ALBUMS.map(a=>`<div class="extra-chip" style="flex-shrink:0" onclick="setShotFormOpt('${s.id}','category','${a.id}',this)">${a.icon} ${a.name}</div>`).join('')}
          </div>
        </div>
        <div class="shot-form-field">
          <span class="shot-form-label">ROLL TYPE</span>
          <div class="shot-form-row">
            <div class="extra-chip" onclick="setShotFormOpt('${s.id}','roll','a-roll',this)">A-ROLL</div>
            <div class="extra-chip" onclick="setShotFormOpt('${s.id}','roll','b-roll',this)">B-ROLL</div>
            <div class="extra-chip" onclick="setShotFormOpt('${s.id}','roll','untagged',this)">UNTAGGED</div>
          </div>
        </div>
        <div class="shot-form-field">
          <span class="shot-form-label">NOTES</span>
          <textarea class="notes-input" id="sf_notes_${s.id}" placeholder="Location, context..." rows="2"></textarea>
        </div>
        <button class="shot-save-btn" onclick="saveShotEntry('${s.id}')">SAVE TO VAULT</button>
      </div>
    </div>`;
  }).join('');
  renderShotLog(currentShotFilter);
}

// per-card form state
const shotFormState={};
function getSFS(sid){if(!shotFormState[sid])shotFormState[sid]={type:'',category:'',roll:'',extraShots:[]};return shotFormState[sid];}

function toggleShotCard(id){
  const card=document.getElementById('sc_'+id);
  const isOpen=card.classList.contains('expanded');
  // close all
  document.querySelectorAll('.shot-card').forEach(c=>c.classList.remove('expanded'));
  if(!isOpen)card.classList.add('expanded');
}

function toggleExtraShot(mainId,shotId,el){
  const sfs=getSFS(mainId);
  el.classList.toggle('sel');
  if(el.classList.contains('sel')){
    if(!sfs.extraShots.includes(shotId))sfs.extraShots.push(shotId);
  }else{
    sfs.extraShots=sfs.extraShots.filter(x=>x!==shotId);
  }
}

function setShotFormOpt(mainId,field,val,el){
  const sfs=getSFS(mainId);
  sfs[field]=val;
  const row=el.parentElement;
  row.querySelectorAll('.extra-chip').forEach(c=>{
    if(['type','category','roll'].includes(field))c.classList.remove('sel');
  });
  el.classList.add('sel');
}

function saveShotEntry(mainId){
  const sfs=getSFS(mainId);
  const name=document.getElementById('sf_name_'+mainId).value.trim();
  if(!name){alert('Add a file name first.');return;}
  const allShots=[mainId,...(sfs.extraShots||[])];
  entries.unshift({
    id:Date.now()+'-'+Math.random().toString(36).substr(2,6),
    name,
    type:sfs.type||'photo',
    category:sfs.category||'',
    roll:sfs.roll||'b-roll',
    shots:allShots,
    shot:mainId,
    notes:document.getElementById('sf_notes_'+mainId).value,
    date:new Date().toISOString()
  });
  save();
  // reset form
  document.getElementById('sf_name_'+mainId).value='';
  document.getElementById('sf_notes_'+mainId).value='';
  shotFormState[mainId]={type:'',category:'',roll:'',extraShots:[]};
  document.querySelectorAll(`#se_${mainId} .extra-chip`).forEach(c=>c.classList.remove('sel'));
  renderShots();renderLibrary();
  alert('Saved to Vault ✓');
}

function filterByShot(id){
  currentShotFilter=currentShotFilter===id?null:id;
  document.getElementById('shotResultsLabel').textContent=
    currentShotFilter?SHOTS.find(s=>s.id===id).name+' — LOGGED':'ALL SHOT-TAGGED ENTRIES';
  renderShots();
}

function renderShotLog(shotId){
  let items=entries.filter(e=>e.shots&&e.shots.length||e.shot);
  if(shotId)items=items.filter(e=>(e.shots&&e.shots.includes(shotId))||e.shot===shotId);
  const list=document.getElementById('shotLogList');
  if(!items.length){
    list.innerHTML='<div class="empty-state" style="padding:24px 0"><span class="empty-icon" style="font-size:28px">🎬</span><div class="empty-text">NO SHOT-TAGGED ENTRIES YET</div></div>';
    return;
  }
  list.innerHTML=items.map(e=>logItemHTML(e)).join('');
}

function buildAddOpts(){
  document.getElementById('catOpts').innerHTML=ALBUMS.map(a=>
    `<div class="opt-btn" onclick="pickOpt(this,'category','${a.id}','sel-red')">${a.icon} ${a.name}</div>`
  ).join('');
  document.getElementById('shotOpts').innerHTML=
    `<div class="opt-btn" onclick="toggleAllShots(this)">⚡ ALL</div>`+
    SHOTS.map(s=>
      `<div class="opt-btn shot-multi" onclick="toggleShot(this,'${s.id}')">${s.name}</div>`
    ).join('');
}

function pickOpt(el,field,val,cls){
  el.parentElement.querySelectorAll('.opt-btn:not(.shot-multi)').forEach(b=>b.classList.remove('sel-red','sel-green','sel-blue'));
  el.classList.add(cls);
  addState[field]=val;
}

function toggleShot(el,id){
  el.classList.toggle('sel-red');
  const selected=Array.from(document.querySelectorAll('.shot-multi.sel-red')).map(b=>b.dataset.shotid||id);
  // collect all selected shot ids
  const ids=Array.from(document.querySelectorAll('.shot-multi.sel-red')).map(b=>b.getAttribute('onclick').match(/'([^']+)'\)/)[1]);
  addState.shots=ids;
}

function toggleAllShots(el){
  const allBtns=document.querySelectorAll('.shot-multi');
  const allSelected=Array.from(allBtns).every(b=>b.classList.contains('sel-red'));
  if(allSelected){
    allBtns.forEach(b=>b.classList.remove('sel-red'));
    el.classList.remove('sel-red');
    addState.shots=[];
  }else{
    allBtns.forEach(b=>b.classList.add('sel-red'));
    el.classList.add('sel-red');
    addState.shots=SHOTS.map(s=>s.id);
  }
}

function saveEntry(){
  const name=document.getElementById('nameInput').value.trim();
  if(!name){alert('Add a file name or description first.');return;}
  if(!addState.category){alert('Choose a category.');return;}
  const shots=addState.shots&&addState.shots.length?addState.shots:(addState.shot?[addState.shot]:[]);
  entries.unshift({
    id:Date.now()+'-'+Math.random().toString(36).substr(2,6),
    name,
    type:addState.type||'photo',
    category:addState.category,
    roll:addState.roll,
    shots:shots,
    shot:shots[0]||'',
    notes:document.getElementById('notesInput').value,
    date:new Date().toISOString()
  });
  save();resetAdd();
  alert('Saved to Vault ✓');
  renderLibrary();
}

function resetAdd(){
  addState={type:'',category:'',roll:'',shot:'',shots:[]};
  document.getElementById('nameInput').value='';
  document.getElementById('notesInput').value='';
  document.querySelectorAll('#page-add .opt-btn').forEach(b=>b.classList.remove('sel-red','sel-green','sel-blue'));
}

function openDetail(id){
  const e=entries.find(i=>i.id===id);
  if(!e)return;
  const alb=ALBUMS.find(a=>a.id===e.category);
  const shots=(e.shots&&e.shots.length?e.shots:(e.shot?[e.shot]:[])).map(id=>SHOTS.find(s=>s.id===id)).filter(Boolean);
  const dateStr=new Date(e.date).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
  document.getElementById('sheetTitleText').textContent=e.name||'Entry';
  document.getElementById('sheetContent').innerHTML=`
    <div class="meta-row"><div class="meta-key">TYPE</div><div class="meta-val"><span class="meta-badge" style="background:var(--bg3);color:var(--muted);border:1px solid var(--border2)">${(e.type||'MEDIA').toUpperCase()}</span></div></div>
    ${alb?`<div class="meta-row"><div class="meta-key">ALBUM</div><div class="meta-val"><span class="meta-badge" style="background:${alb.bg};color:var(--text)">${alb.icon} ${alb.name}</span></div></div>`:''}
    ${e.roll&&e.roll!=='untagged'?`<div class="meta-row"><div class="meta-key">ROLL</div><div class="meta-val"><span class="meta-badge" style="background:${e.roll==='a-roll'?'var(--green-dim)':'var(--blue-dim)'};color:${e.roll==='a-roll'?'var(--green)':'var(--blue)'}">${e.roll.toUpperCase()}</span></div></div>`:''}
    ${shots.length?`<div class="meta-row"><div class="meta-key">SHOTS</div><div class="meta-val" style="display:flex;flex-wrap:wrap;gap:5px">${shots.map(s=>`<span class="meta-badge" style="background:var(--red-dim);color:var(--red)">${s.name}</span>`).join('')}</div></div>`:''}
    ${e.notes?`<div class="meta-row"><div class="meta-key">NOTES</div><div class="meta-val" style="font-size:11px;line-height:1.7;color:var(--muted)">${e.notes}</div></div>`:''}
    <div class="meta-row"><div class="meta-key">DATE</div><div class="meta-val" style="color:var(--muted);font-size:11px">${dateStr}</div></div>
    <button class="sheet-btn" style="background:rgba(66,133,244,0.15);color:#4285f4;border:1px solid rgba(66,133,244,0.3);margin-top:8px" onclick="openGooglePhotos('${e.date}','${(e.name||'').replace(/'/g,'')}')">🔍 FIND IN GOOGLE PHOTOS</button>
    <button class="sheet-btn sheet-btn-del" onclick="deleteEntry('${e.id}')">DELETE ENTRY</button>
    <button class="sheet-btn sheet-btn-close" onclick="closeSheet()">CLOSE</button>
  `;
  document.getElementById('sheetBackdrop').classList.add('open');
}

function deleteEntry(id){
  if(!confirm('Delete this entry?'))return;
  entries=entries.filter(e=>e.id!==id);
  save();closeSheet();renderLibrary();
}

function openGooglePhotos(dateStr, name){
  // Build a search query from the date and filename keywords
  const d = new Date(dateStr);
  const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  const query = encodeURIComponent(months[d.getMonth()]+' '+d.getDate()+' '+d.getFullYear());
  window.open('https://photos.google.com/search/'+query, '_blank');
}

function closeSheet(){document.getElementById('sheetBackdrop').classList.remove('open');}
function closeSheetOutside(ev){if(ev.target===document.getElementById('sheetBackdrop'))closeSheet();}

buildAddOpts();
renderLibrary();
</script>
</body>
</html>
